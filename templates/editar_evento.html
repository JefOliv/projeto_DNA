{% extends "base.html" %}

{% block title %}Editar Evento - {{ evento.titulo }}{% endblock %}

{% block content %}
    <h1>Editar Evento: {{ evento.titulo }}</h1>

    <form method="post">
        <label for="titulo">Título do Evento:</label>
        <input type="text" id="titulo" name="titulo" value="{{ evento.titulo }}" required>

        <label for="data_hora">Data e Hora do Evento:</label>
        <input type="datetime-local" id="data_hora" name="data_hora" value="{{ evento.data_hora_local_str }}" required>

        <label for="descricao">Descrição (Opcional):</label>
        <textarea id="descricao" name="descricao" rows="4">{{ evento.descricao if evento.descricao else '' }}</textarea>

        <label for="local">Local (Opcional):</label>
        <input type="text" id="local" name="local" value="{{ evento.local if evento.local else '' }}">

        <button type="submit" class="button primary">Salvar Alterações</button>
        <a href="{{ url_for('calendario') }}" class="button secondary">Cancelar</a>
        {# NOVO: Botão de exclusão #}
        <button type="button" class="button delete" onclick="confirmDelete({{ evento.id }})">Excluir Evento</button>
    </form>
{% endblock %}

{% block scripts %}
    {{ super() }}
    <script>
        function confirmDelete(eventId) {
            if (confirm('Tem certeza que deseja excluir este evento?')) {
                fetch(`/deletar_evento/${eventId}`, {
                    method: 'DELETE'
                })
                .then(response => {
                    if (response.ok) {
                        alert('Evento excluído com sucesso!');
                        window.location.href = "{{ url_for('calendario') }}"; // Redireciona para o calendário
                    } else {
                        return response.text().then(text => {
                            throw new Error('Erro ao excluir evento: ' + text);
                        });
                    }
                })
                .catch(error => {
                    console.error('Erro na exclusão do evento:', error);
                    alert(error.message);
                });
            }
        }
    </script>
{% endblock %}
