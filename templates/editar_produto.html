<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8" />
    <title>Editar Produto</title>
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <nav>
            <div class="user-info">
                Olá, {{ usuario }} (Matrícula: {{ matricula }})!
            </div>
            <ul>
                <li><a href="{{ url_for('painel') }}">Início</a></li>
                <li><a href="{{ url_for('editor_produto') }}">Estoque</a></li>
                <li><a href="{{ url_for('historico_estoque') }}">Histórico de Estoque</a></li>
                <li><a href="{{ url_for('funcionarios') }}">Funcionários</a></li>
                <li><a href="{{ url_for('entregar_item') }}">Registrar Entrega de Item</a></li>
                <li><a href="{{ url_for('calendario') }}">Calendário</a></li>
                <li><a href="{{ url_for('logout') }}">Sair</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Editar Produto</h1>
        <form method="post" action="{{ url_for('atualizar_produto', id=produto.id) }}">
            <label>Nome:</label>
            <input type="text" name="nome" value="{{ produto.nome }}" required />
            <br>
            <label>Quantidade:</label>
            <input type="number" name="quantidade" value="{{ produto.quantidade }}" min="0" required />
            <br>
            <label>Preço:</label>
            <input type="number" step="0.01" name="preco" value="{{ produto.preco }}" min="0" required />
            <br>

            {# NOVO CAMPO: Alerta de Estoque Baixo #}
            <label>Alerta de Estoque Baixo a partir de:</label>
            <input type="number" name="estoque_minimo" value="{{ produto.estoque_minimo if produto.estoque_minimo is not none else 5 }}" min="0" required />
            <br>
            
            <button type="submit">Salvar</button>
        </form>
        <a href="{{ url_for('editor_produto') }}" class="button secondary" style="margin-top: 15px;">Voltar para o Estoque</a>
    </main>
</body>
</html>
